name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run deterministic checks
        run: swift run DragTimer --self-test

      - name: Build the app bundle
        run: ./Scripts/build-app.sh

      - name: Confirm the bundle has a valid ad-hoc signature
        run: |
          codesign --verify --deep --strict "dist/Drag Timer.app"
          authority="$(codesign --display --verbose=2 "dist/Drag Timer.app" 2>&1 | grep '^Signature=' || true)"
          if [ "$authority" != "Signature=adhoc" ]; then
            echo "The release bundle must carry an ad-hoc signature, got: ${authority:-none}"
            exit 1
          fi
