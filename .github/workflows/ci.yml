name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Build
        run: swift build

      - name: Run unit tests
        run: swift test

      - name: Run deterministic checks
        run: swift run DragTimer --self-test

      - name: Test release validator
        run: ./Scripts/test-validate-release.sh

      - name: Build the universal app bundle
        run: ./Scripts/build-app.sh

      - name: Verify architectures, icon, and ad-hoc signature
        run: |
          executable="dist/Drag Timer.app/Contents/MacOS/DragTimer"
          test "$(lipo -archs "$executable" | tr ' ' '\n' | sort | tr '\n' ' ' | sed 's/ $//')" = "arm64 x86_64"
          test -s "dist/Drag Timer.app/Contents/Resources/AppIcon.icns"
          codesign --verify --deep --strict --verbose=2 "dist/Drag Timer.app"
          test "$(codesign --display --verbose=2 "dist/Drag Timer.app" 2>&1 | sed -n 's/^Signature=//p')" = "adhoc"
