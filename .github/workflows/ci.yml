name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-14

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run deterministic checks
        run: swift run DragTimer --self-test

      - name: Build the unsigned app bundle
        run: ./Scripts/build-app.sh

      - name: Confirm the bundle is unsigned
        run: |
          if codesign --display --verbose=0 "dist/Drag Timer.app" >/dev/null 2>&1; then
            echo "The release bundle must remain unsigned."
            exit 1
          fi
